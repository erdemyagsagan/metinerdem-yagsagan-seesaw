<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seesaw Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <div class="info">
      <div class="info-box">
        Left Weight: <span id="leftWeight">0</span> kg
      </div>

      <div class="info-box">
        Right Weight: <span id="rightWeight">0</span> kg
      </div>
    </div>

    <div class="seesaw-cover">
      <div class="plank" id="plank">
        <div class="pivot"></div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
